name: Horóscopo Diario Automático

on:
  schedule:
    - cron: '0 5 * * *'      # Todos los días a las 6:00 AM hora de España
  workflow_dispatch:         # Permite ejecutarlo manualmente desde GitHub

permissions:
  contents: write

jobs:
  actualizar-horoscopo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install @anthropic-ai/sdk

      - name: Generar horóscopos con Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generar-horoscopo.js

      - name: Commit y push cambios
        run: |
          git config --global user.name "Horoscopito Bot"
          git config --global user.email "bot@horoscopito.com"
          git add -A
          git commit -m "✨ Horóscopo actualizado - $(date '+%d/%m/%Y')" || echo "No hay cambios nuevos"
          git push
