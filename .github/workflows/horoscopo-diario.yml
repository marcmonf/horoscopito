name: Horóscopo Diario Automático

on:
  schedule:
    - cron: '0 5 * * *'     # Cada día a las 5:00 UTC (6:00 España)
  workflow_dispatch:

permissions:
  contents: write           # ←←← ESTO ES LO QUE FALTABA

jobs:
  actualizar-horoscopo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install @anthropic-ai/sdk

      - name: Generar horóscopos con Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generar-horoscopo.js

      - name: Commit y push automático
        run: |
          git config --global user.name "Horoscopito Bot"
          git config --global user.email "bot@horoscopito.com"
          git add -A
          git commit -m "✨ Horóscopo actualizado - $(date '+%d/%m/%Y')" || echo "No hay cambios"
          git push
